<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillRadar - Alerts</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="page-nav" style="padding: 16px 24px; border-bottom: 1px solid var(--border-default); background: var(--surface-card);">
        <a href="../index.html" style="color: var(--brand); text-decoration: none; font-weight: 500;">← Back to Dashboard</a>
    </nav>

    <!-- Alerts Section -->
    <section id="alerts" class="section section--active">
        <div class="page-content">
            <h1 class="page-title">Job Alerts</h1>
            <p class="page-subtitle">Set up notifications for new jobs matching your preferences.</p>

            <!-- Create Alert Form -->
            <div class="section-block" style="margin-bottom: 32px;">
                <h2>Create New Alert</h2>
                <div class="alert-form" style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px;">
                    <input type="text" id="alert-name" class="form-input" placeholder="Alert name (e.g., React Jobs)" style="flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid var(--border-default); border-radius: 8px; background: var(--surface-card); color: var(--text-primary);">
                    <select id="alert-skill" class="form-select" style="padding: 10px 14px; border: 1px solid var(--border-default); border-radius: 8px; background: var(--surface-card); color: var(--text-primary); min-width: 150px;">
                        <option value="">Select Skill</option>
                    </select>
                    <select id="alert-location" class="form-select" style="padding: 10px 14px; border: 1px solid var(--border-default); border-radius: 8px; background: var(--surface-card); color: var(--text-primary); min-width: 150px;">
                        <option value="">Any Location</option>
                    </select>
                    <select id="alert-level" class="form-select" style="padding: 10px 14px; border: 1px solid var(--border-default); border-radius: 8px; background: var(--surface-card); color: var(--text-primary); min-width: 130px;">
                        <option value="">Any Level</option>
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                    <button id="create-alert-btn" class="btn-primary" style="padding: 10px 20px; border-radius: 8px; cursor: pointer;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px; vertical-align: middle;">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        Create Alert
                    </button>
                </div>
            </div>

            <!-- My Alerts -->
            <div class="section-block" style="margin-bottom: 32px;">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h2>My Alerts</h2>
                    <span class="badge" id="alerts-count" style="background: var(--brand); color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px;">0</span>
                </div>
                <div id="my-alerts-list" class="alerts-list"></div>
                <div id="no-alerts-state" class="empty-state" style="text-align: center; padding: 40px 20px; color: var(--text-muted); display: none;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 12px;">
                        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
                        <path d="m13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <p>No alerts set up yet. Create one above to get notified about matching jobs.</p>
                </div>
            </div>

            <!-- Recent Notifications -->
            <div class="section-block">
                <h2>Recent Notifications</h2>
                <p class="section-subtitle" style="color: var(--text-muted); margin-bottom: 16px;">Updates based on your preferences and market trends</p>
                <div id="notifications-list" class="notifications-list"></div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="../data.js"></script>
    <script type="module" src="alerts.js"></script>
</body>
</html>
